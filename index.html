// 税抜き本体価格を取得（カード手数料を含めない正しい計算）
// subtotal フィールドが保存されていればそれを使い、なければ amount - cardFee から逆算
function getTaxExcluded(e) {
  if (e.subtotal != null) return e.subtotal;
  const cardFee = e.cardFee || 0;
  return Math.floor((e.amount - cardFee) / 1.1);
}
// 消費税額を取得
function getTax(e) {
  if (e.tax != null) return e.tax;
  const cardFee = e.cardFee || 0;
  return e.amount - cardFee - Math.floor((e.amount - cardFee) / 1.1);
}

// 営業日を取得（当日20:00〜翌日19:59 を1営業日とする / JST基準）
// 入力フォーマット:
//   "YYYY-MM-DDTHH:MM"      → datetime-local（ローカル時刻）
//   "YYYY-MM-DD HH:MM:SS"   → ISO文字列由来（UTC）→ JST に変換してから判定
//   "YYYY-MM-DD"            → 0時扱い（前日となる）
function getBusinessDate(datetime) {
  if (!datetime) return "";
  let datePart, hour;
  if (datetime.includes("T")) {
    // ローカル時刻（datetime-local）
    const [d, t = "00:00"] = datetime.split("T");
    datePart = d;
    hour = parseInt(t.slice(0, 2));
  } else if (datetime.includes(" ")) {
    // UTC（toISOString().slice(0,19).replace("T"," ")）→ JST(+9h)
    const [d, t] = datetime.split(" ");
    const utc = new Date(`${d}T${t}Z`);
    if (isNaN(utc)) return d;
    const jst = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
    datePart = `${jst.getUTCFullYear()}-${String(jst.getUTCMonth() + 1).padStart(2, "0")}-${String(jst.getUTCDate()).padStart(2, "0")}`;
    hour = jst.getUTCHours();
  } else {
    // 日付のみ
    datePart = datetime.slice(0, 10);
    hour = 0;
  }
  if (hour >= 20) return datePart;
  // 19:59 以前は前日扱い
  const [y, m, d] = datePart.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() - 1);
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
}

function calcItemTotal(item) {
  if (item.name === "セット制") {
    const ext = item.extPrice || 1000;
    const hours = item.hours || 1;
    return item.qty * (item.price + Math.max(0, hours - 1) * ext);
  }
  return item.price * item.qty;
}

}

  for (let d = 1; d <= 20; d++) {

    entries.push({
      id: crypto.randomUUID(),
      staff,
      customerName: customers[d % customers.length],
      amount: Math.floor(Math.random() * 30000) + 5000,
      role: roles[d % 3],
      datetime: `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}T${String(12 + d % 8).padStart(2, "0")}:00`
    });
  }
  return entries;
}

  { name: "佐藤", role: "staff" },
  { name: "鈴木", role: "staff" },
  { name: "山田", role: "staff" },
];
const ROLES = { 従業員: 0.5, メイン: 0.5, ヘルプ: 0.4, サクラ: 0.3 };
const COMPANY_RATES = { 従業員: 0.3, メイン: 0.4, ヘルプ: 0.5, サクラ: 0.5 };
const MGR_RATES = { 従業員: 0.2, メイン: 0.1, ヘルプ: 0.1, サクラ: 0.2 };
const MGR_SPLIT = 2; // 管理者2名に各10%ずつ配分

const MANAGER_BASE = 150000;
const BONUS_TIERS = [
  { min: 1000000, rate: 0.5 },
  { min: 800000, rate: 0.4 },
  { min: 700000, rate: 0.3 },
  { min: 600000, rate: 0.25 },
  { min: 500000, rate: 0.2 },
  { min: 400000, rate: 0 },
];

function calcManagerBonus(taxExcluded) {
  for (const t of BONUS_TIERS) {
    if (taxExcluded >= t.min) return Math.floor(taxExcluded * t.rate);
  }
  return 0;
}

function getBonusTierLabel(taxExcluded) {
  for (const t of BONUS_TIERS) {
    if (taxExcluded >= t.min) return `${Math.floor(t.rate * 100)}%（${formatYen(t.min)}以上）`;
  }
  return "0%（40万円未満）";
}

function formatYen(n) {
  return "¥" + n.toLocaleString();
}

function roleTagColors(role) {
  if (role === "従業員") return [palette.greenSoft, palette.green];
  return [palette.cardAlt, palette.textDim];
}

function calcItemTotal(item) {
  if (item.name === "セット制") {
    const ext = item.extPrice || 1000;
    const hours = item.hours || 1;
    return item.qty * (item.price + Math.max(0, hours - 1) * ext);
  }
  return item.price * item.qty;
}

function nowLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}T${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}

// --- Demo seed data ---
function seedData() {
  const entries = [];
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const roles = ["従業員"];
  for (let d = 1; d <= 20; d++) {
    const staff = DEFAULT_STAFF[d % DEFAULT_STAFF.length].name;
    const customers = ["山本様", "中村様", "小林様", "加藤様", "吉田様"];
    entries.push({
      id: crypto.randomUUID(),
      staff,
      customerName: customers[d % customers.length],
      amount: Math.floor(Math.random() * 30000) + 5000,
      role: roles[d % 3],
      datetime: `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}T${String(12 + (d % 8)).padStart(2, "0")}:00`,
    });
  }
  return entries;
}

// ─── Shift Panel (出勤管理) ───
function ShiftPanel({ staffName, shifts, onUpdateShifts, staffList, userRole }) {
  const [shiftDate, setShiftDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [startTime, setStartTime] = useState("20:00");
  const [goal, setGoal] = useState("");
  const [msg, setMsg] = useState("");
  const canSeeGoal = userRole === "owner" || userRole === "manager" || userRole === "master";

  const today = new Date().toISOString().slice(0, 10);

  const myShifts = shifts.filter(sh => sh.staff === staffName && sh.date >= today).sort((a, b) => a.date.localeCompare(b.date));

  const next7 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    next7.push(d.toISOString().slice(0, 10));
  }

  const submitShift = () => {
    if (!shiftDate) return;
    if (shifts.some(sh => sh.staff === staffName && sh.date === shiftDate)) {
      setMsg("この日は既に提出済みです");
      setTimeout(() => setMsg(""), 2000);
      return;
    }
    onUpdateShifts([...shifts, {
      id: crypto.randomUUID(),
      staff: staffName,
      date: shiftDate,
      startTime,
      goal: parseInt(goal) || 0,
      submittedAt: new Date().toISOString().slice(0, 19).replace("T", " "),
    }]);
    setMsg("提出しました");
    setGoal("");
    setTimeout(() => setMsg(""), 2000);
  };

  const cancelShift = (id) => {
    onUpdateShifts(shifts.filter(sh => sh.id !== id));
  };

  const roleLabel = (name) => {
    const st = staffList.find(x => x.name === name);
    return st ? (st.role === "owner" ? "オーナー" : st.role === "manager" ? "管理者" : "スタッフ") : "";
  };
  const roleColor = (name) => {
    const st = staffList.find(x => x.name === name);
    if (!st) return [palette.greenSoft, palette.green];
    if (st.role === "owner") return ["rgba(249,115,22,0.15)", palette.orange];
    if (st.role === "manager") return [palette.accentSoft, palette.accent];
    return [palette.greenSoft, palette.green];
  };

  return (
    <div>
      {/* Submit shift */}
      <div style={s.card}>
        <div style={s.cardTitle}>出勤予定を提出</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
          <input style={{ ...s.input, flex: 1 }} type="date" value={shiftDate} onChange={e => setShiftDate(e.target.value)} />
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 11, color: palette.textDim }}>開始</span>
            <input style={{ ...s.input, width: 100 }} type="time" value={startTime} onChange={e => setStartTime(e.target.value)} />
          </div>
        </div>
        {canSeeGoal && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 11, color: palette.textDim, whiteSpace: "nowrap" }}>目標金額</span>
            <input style={{ ...s.input, flex: 1 }} type="number" placeholder="¥0" value={goal} onChange={e => setGoal(e.target.value)} />
          </div>
        )}
        <button onClick={submitShift} style={{ ...s.btn, width: "100%", padding: "10px", fontSize: 13 }}>提出</button>
        {msg && <div style={{ color: palette.green, fontSize: 12, marginTop: 8 }}>{msg}</div>}
      </div>

      {/* My shifts */}
      {myShifts.length > 0 && (
        <div style={s.card}>
          <div style={s.cardTitle}>自分の出勤予定</div>
          {myShifts.map(sh => (
            <div key={sh.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${palette.border}`, fontSize: 13 }}>
              <div>
                <span style={{ fontWeight: 600 }}>{sh.date}</span>
                <span style={{ color: palette.textDim, marginLeft: 8 }}>{sh.startTime}〜</span>
                {canSeeGoal && sh.goal > 0 && <span style={{ color: palette.accent, marginLeft: 8, fontSize: 11 }}>目標 {formatYen(sh.goal)}</span>}
              </div>
              <button onClick={() => cancelShift(sh.id)} style={{ ...s.btnOutline, padding: "3px 8px", fontSize: 10, color: palette.red, borderColor: palette.red }}>取消</button>
            </div>
          ))}
        </div>
      )}

      {/* Weekly schedule */}
      <div style={s.card}>
        <div style={s.cardTitle}>今後7日間の出勤予定</div>
        {next7.map(date => {
          const dayShifts = shifts.filter(sh => sh.date === date).sort((a, b) => (a.startTime || "").localeCompare(b.startTime || ""));
          const dayOfWeek = ["日", "月", "火", "水", "木", "金", "土"][new Date(date).getDay()];
          const isToday = date === today;
          return (
            <div key={date} style={{ padding: "8px 0", borderBottom: `1px solid ${palette.border}` }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: isToday ? palette.accent : palette.white, marginBottom: 4 }}>
                {date.slice(5)} ({dayOfWeek}){isToday ? " ← 今日" : ""}
              </div>
              {dayShifts.length === 0 ? (
                <div style={{ fontSize: 11, color: palette.textDim, paddingLeft: 8 }}>予定なし</div>
              ) : (
                dayShifts.map(sh => (
                  <div key={sh.id} style={{ display: "flex", alignItems: "center", gap: 8, paddingLeft: 8, fontSize: 12, padding: "2px 0 2px 8px" }}>
                    <span style={{ fontWeight: 600 }}>{sh.staff}</span>
                    <span style={s.tag(...roleColor(sh.staff))}>{roleLabel(sh.staff)}</span>
                    <span style={{ color: palette.textDim }}>{sh.startTime}〜</span>
                    {canSeeGoal && sh.goal > 0 && <span style={{ color: palette.accent, fontSize: 10 }}>{formatYen(sh.goal)}</span>}
                  </div>
                ))
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── NumPad ───
function NumPad({ value, onChange, maxLen }) {
  const max = maxLen || 4;
  const press = (n) => { if (value.length < max) onChange(value + n); };
  const del = () => onChange(value.slice(0, -1));
  const clear = () => onChange("");
  const btnStyle = { display: "flex", alignItems: "center", justifyContent: "center", width: "100%", height: 48, borderRadius: 10, border: `1px solid ${palette.border}`, background: palette.cardAlt, color: palette.white, fontSize: 20, fontWeight: 600, fontFamily: font, cursor: "pointer" };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 16, height: 32, alignItems: "center" }}>
        {Array.from({ length: max }).map((_, i) => (
          <div key={i} style={{ width: 14, height: 14, borderRadius: 99, background: i < value.length ? palette.accent : palette.border, transition: "background .15s" }} />
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
        {[1,2,3,4,5,6,7,8,9].map(n => (
          <button key={n} onClick={() => press(String(n))} style={btnStyle}>{n}</button>
        ))}
        <button onClick={clear} style={{ ...btnStyle, fontSize: 13, color: palette.textDim }}>AC</button>
        <button onClick={() => press("0")} style={btnStyle}>0</button>
        <button onClick={del} style={{ ...btnStyle, fontSize: 16, color: palette.orange }}>←</button>
      </div>
    </div>
  );
}

// ─── Login ───
function Login({ onLogin, staffList }) {
  const roleOrder = { owner: 0, manager: 1, staff: 2 };
  const sorted = [...staffList].sort((a, b) => {
    if (a.role !== b.role) return (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9);
    return a.name.localeCompare(b.name, "ja");
  });
  const lastUser = typeof localStorage !== "undefined" ? localStorage.getItem("sales-manager-last-user") : null;
  const defaultName = (lastUser && sorted.some(st => st.name === lastUser)) ? lastUser : (sorted.length > 0 ? sorted[0].name : "");
  const [name, setName] = useState(defaultName);
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [masterMode, setMasterMode] = useState(false);
  const [masterPw, setMasterPw] = useState("");
  const [masterError, setMasterError] = useState("");

  const handleLogin = () => {
    if (!name || !password.trim()) { setError("名前とパスワードを入力してください"); return; }
    const found = staffList.find(s => s.name === name);
    if (!found) { setError("登録されていない名前です"); return; }
    if ((found.password || "0000") !== password) { setError("パスワードが違います"); return; }
    localStorage.setItem("sales-manager-last-user", found.name);
    onLogin(found.role, found.name);
  };

  const handleMaster = () => {
    const owner = staffList.find(st => st.role === "owner");
    const masterPassword = owner ? (owner.password || "0000") : "0210";
    if (masterPw === masterPassword) {
      localStorage.setItem("sales-manager-last-user", "マスター");
      onLogin("master", "マスター");
    } else {
      setMasterError("パスワードが違います");
    }
  };

  if (masterMode) {
    return (
      <div style={s.loginWrap}>
        <div style={s.loginCard}>
          <div style={{ fontSize: 22, fontWeight: 700, color: palette.white, marginBottom: 24 }}>マスター管理</div>
          <NumPad value={masterPw} onChange={v => { setMasterPw(v); setMasterError(""); }} maxLen={4} />
          {masterError && <div style={{ color: palette.red, fontSize: 12, marginBottom: 12, marginTop: 12 }}>{masterError}</div>}
          <button style={{ ...s.btn, width: "100%", background: palette.orange, marginTop: 12 }} onClick={handleMaster}>ログイン</button>
          <button style={{ ...s.btnOutline, width: "100%", marginTop: 10 }} onClick={() => { setMasterMode(false); setMasterPw(""); setMasterError(""); }}>戻る</button>
        </div>
      </div>
    );
  }

  return (
    <div style={s.loginWrap}>
      <div style={s.loginCard}>
        <div style={{ fontSize: 28, fontWeight: 700, color: palette.white, marginBottom: 6 }}>売上管理</div>
        <div style={{ color: palette.textDim, fontSize: 13, marginBottom: 32 }}>ログインしてください</div>
        {staffList.length === 0 ? (
          <div style={{ color: palette.textDim, fontSize: 13, marginBottom: 12 }}>スタッフが登録されていません</div>
        ) : (
          <select style={{ ...s.select, marginBottom: 12 }} value={name} onChange={e => { setName(e.target.value); setError(""); }}>
            {[...staffList].sort((a, b) => {
              const ro = { owner: 0, manager: 1, staff: 2 };
              if (a.role !== b.role) return (ro[a.role] ?? 9) - (ro[b.role] ?? 9);
              return a.name.localeCompare(b.name, "ja");
            }).map(st => (
              <option key={st.name} value={st.name}>{st.name}（{st.role === "owner" ? "オーナー" : st.role === "manager" ? "管理者" : "スタッフ"}）</option>
            ))}
          </select>
        )}
        <NumPad value={password} onChange={v => { setPassword(v); setError(""); }} maxLen={4} />
        {error && <div style={{ color: palette.red, fontSize: 12, marginBottom: 12, marginTop: 12 }}>{error}</div>}
        <button style={{ ...s.btn, width: "100%", marginBottom: 16, marginTop: 12 }} onClick={handleLogin}>ログイン</button>
        <button style={{ ...s.btnOutline, width: "100%", borderColor: palette.orange, color: palette.orange }} onClick={() => setMasterMode(true)}>マスター管理</button>
      </div>
    </div>
  );
}

function formatTime(ts) {
  if (!ts) return "--:--";
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function elapsedStr(ts) {
  if (!ts) return "0分";
  const diff = Math.max(0, Date.now() - ts);
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? `${h}時間${m}分` : `${m}分`;
}

function elapsedHours(ts) {
  if (!ts) return 1;
  const h = (Date.now() - ts) / 3600000;
  return Math.max(1, Math.ceil(h));
}

const PLAN_NAMES = ["飲み飲ませ（無制限）", "セット制"];

// ─── Order Panel (per customer) ───
function OrderPanel({ customer, onSave, onCheckout, onBack, isManager, menu }) {
  const [cart, setCart] = useState(customer.items || []);
  const [activeCat, setActiveCat] = useState(menu[0].cat);
  const [showCheckout, setShowCheckout] = useState(false);
  const [payMethod, setPayMethod] = useState("cash");
  const [received, setReceived] = useState("");
  const [role, setRole] = useState("従業員");
  const [datetime, setDatetime] = useState(customer.datetime || nowLocal());
  const [now, setNow] = useState(Date.now());

  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(id);
  }, []);

  // Auto-update セット制 hours based on elapsed time
  useEffect(() => {
    const setIdx = cart.findIndex(c => c.name === "セット制");
    if (setIdx < 0) return;
    const hours = elapsedHours(customer.startTime);
    if ((cart[setIdx].hours || 1) < hours) {
      setCart(prev => {
        const next = [...prev];
        next[setIdx] = { ...next[setIdx], hours };
        return next;
      });
    }
  }, [now, cart, customer.startTime]);

  const hasPlan = cart.some(c => PLAN_NAMES.includes(c.name));
  const planItems = menu.find(m => m.cat === "料金設定")?.items || [];

  const total = cart.reduce((s, c) => s + calcItemTotal(c), 0);

  const selectPlan = (item) => {
    setCart(prev => {
      const filtered = prev.filter(c => !PLAN_NAMES.includes(c.name));
      if (item.name === "セット制") {
        return [...filtered, { ...item, qty: 1, hours: elapsedHours(customer.startTime) }];
      }
      return [...filtered, { ...item, qty: 1 }];
    });
  };

  const addItem = (item) => {
    // Plan items: increment qty (= number of people)
    if (PLAN_NAMES.includes(item.name)) {
      const existing = cart.find(c => c.name === item.name);
      if (!existing) { selectPlan(item); return; }
      setCart(prev => prev.map(c => c.name === item.name ? { ...c, qty: c.qty + 1 } : c));
      return;
    }
    setCart(prev => {
      const idx = prev.findIndex(c => c.name === item.name);
      if (idx >= 0) {
        const next = [...prev];
        next[idx] = { ...next[idx], qty: next[idx].qty + 1 };
        return next;
      }
      return [...prev, { ...item, qty: 1 }];
    });
  };

  const removeItem = (name) => {
    setCart(prev => {
      const idx = prev.findIndex(c => c.name === name);
      if (idx < 0) return prev;
      if (prev[idx].qty <= 1) return prev.filter(c => c.name !== name);
      const next = [...prev];
      next[idx] = { ...next[idx], qty: next[idx].qty - 1 };
      return next;
    });
  };

  const catItems = menu.find(m => m.cat === activeCat)?.items || [];

  return (
    <div style={s.card}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={s.cardTitle}>{customer.name} 様</div>
          <div style={{ fontSize: 12, color: palette.textDim, marginTop: 2 }}>
            開始 {formatTime(customer.startTime)}　（{elapsedStr(customer.startTime)} 経過）
          </div>
        </div>
        <button onClick={() => { onSave(cart, role, datetime); onBack(); }} style={{ ...s.btnOutline, padding: "6px 14px", fontSize: 12 }}>← 顧客一覧</button>
      </div>

      {!isManager && (
        <div style={{ marginBottom: 16 }}>
          <input style={s.input} type="datetime-local" value={datetime} onChange={e => setDatetime(e.target.value)} />
        </div>
      )}

      {/* Plan Selection (mandatory) */}
      {!hasPlan ? (
        <div>
          <div style={{ textAlign: "center", color: palette.orange, fontSize: 13, fontWeight: 600, marginBottom: 12 }}>
            料金設定を選択してください
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
            {planItems.map(item => (
              <button key={item.name} onClick={() => selectPlan(item)} style={{
                padding: "20px 12px", borderRadius: 12,
                border: `2px solid ${palette.border}`,
                background: palette.cardAlt, color: palette.text,
                cursor: "pointer", fontFamily: font, textAlign: "center",
                transition: "all .15s",
              }}>
                <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>{item.name}</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: palette.accent }}>{formatYen(item.price)}/名</div>
                {item.name === "セット制" && <div style={{ fontSize: 11, color: palette.textDim, marginTop: 4 }}>延長1時間ごと ¥1,000/名</div>}
                {item.name === "飲み飲ませ（無制限）" && <div style={{ fontSize: 11, color: palette.textDim, marginTop: 4 }}>時間制限なし</div>}
              </button>
            ))}
          </div>
        </div>
      ) : (
        <>
          {/* Selected Plan Badge */}
          <div style={{ marginBottom: 12 }}>
            {(() => {
              const plan = cart.find(c => PLAN_NAMES.includes(c.name));
              return plan ? (
                <span style={{ ...s.tag(palette.accentSoft, palette.accent), fontSize: 12, padding: "4px 12px" }}>
                  {plan.name} ・ {plan.qty}名
                </span>
              ) : null;
            })()}
          </div>

          {/* Category Tabs */}
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            {menu.map(m => (
              <button key={m.cat} onClick={() => setActiveCat(m.cat)} style={{
                ...s.btnOutline, padding: "6px 14px", fontSize: 12,
                ...(activeCat === m.cat ? { background: palette.accentSoft, color: palette.accent, borderColor: palette.accent } : {}),
              }}>{m.cat}</button>
            ))}
          </div>

          {/* Menu Grid */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: 8, marginBottom: 16 }}>
            {catItems.map(item => {
              const inCart = cart.find(c => c.name === item.name);
              const isPlan = PLAN_NAMES.includes(item.name);
              const isActivePlan = inCart && isPlan;
              return (
                <button key={item.name} onClick={() => addItem(item)} style={{
                  position: "relative", padding: "12px 8px", borderRadius: 10,
                  border: `1px solid ${isActivePlan ? palette.green : inCart ? palette.accent : palette.border}`,
                  background: isActivePlan ? palette.greenSoft : inCart ? palette.accentSoft : palette.cardAlt,
                  color: palette.text, cursor: "pointer", fontFamily: font, textAlign: "center", transition: "all .12s",
                }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{item.name}</div>
                  <div style={{ fontSize: 12, color: item.price < 0 ? "#f87171" : palette.textDim }}>{formatYen(item.price)}</div>
                  {inCart && (
                    <div style={{
                      position: "absolute", top: -6, right: -6, width: 22, height: 22, borderRadius: 99,
                      background: isPlan ? palette.green : palette.accent, color: "#fff", fontSize: 11, fontWeight: 700,
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}>{inCart.qty}</div>
                  )}
                  {isActivePlan && (
                    <div style={{ fontSize: 10, color: palette.green, marginTop: 4, fontWeight: 600 }}>✓ {inCart.qty}名</div>
                  )}
                </button>
              );
            })}
          </div>
        </>
      )}

      {/* Order Items */}
      {cart.length > 0 && (
        <div style={{ background: palette.cardAlt, borderRadius: 10, padding: 12, marginBottom: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: palette.textDim, marginBottom: 8 }}>注文内容</div>
          {cart.map((c, i) => (
            <div key={c.name} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "8px 0", borderBottom: i < cart.length - 1 ? `1px solid ${palette.border}` : "none", fontSize: 14,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontWeight: 600 }}>{c.name}</span>
                {c.name === "セット制" ? (
                  <span style={{ color: palette.textDim, fontSize: 12 }}>{c.qty}名 ・ {(c.hours || 1) <= 1 ? "基本" : `基本＋延長${(c.hours||1) - 1}回`}</span>
                ) : c.name === "飲み飲ませ（無制限）" ? (
                  <span style={{ color: palette.textDim, fontSize: 12 }}>{c.qty}名</span>
                ) : (
                  <span style={{ color: palette.textDim, fontSize: 12 }}>× {c.qty}</span>
                )}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontVariantNumeric: "tabular-nums", fontWeight: 600 }}>{formatYen(calcItemTotal(c))}</span>
                <button onClick={() => addItem(c)} style={{
                  background: "none", border: `1px solid ${palette.border}`, borderRadius: 6,
                  color: palette.green, cursor: "pointer", fontSize: 14, width: 26, height: 26,
                  display: "flex", alignItems: "center", justifyContent: "center", padding: 0,
                }}>+</button>
                <button onClick={() => removeItem(c.name)} style={{
                  background: "none", border: `1px solid ${palette.border}`, borderRadius: 6,
                  color: palette.red, cursor: "pointer", fontSize: 14, width: 26, height: 26,
                  display: "flex", alignItems: "center", justifyContent: "center", padding: 0,
                }}>−</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Buttons */}
      {!showCheckout ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <button style={{ ...s.btn, background: palette.cardAlt, color: palette.text, border: `1px solid ${palette.border}`, padding: "14px", fontSize: 14 }}
            onClick={() => { onSave(cart, role, datetime); onBack(); }}>
            一時保存
          </button>
          <button style={{ ...s.btn, padding: "14px", fontSize: 14, opacity: total > 0 ? 1 : 0.4 }}
            onClick={() => { if (total > 0) setShowCheckout(true); }}>
            {total > 0 ? `会計（${formatYen(Math.floor(total * 1.1))}）` : "メニューを選択"}
          </button>
        </div>
      ) : (
        <div style={{ background: palette.cardAlt, borderRadius: 12, border: `1px solid ${palette.accent}`, padding: 20 }}>
          {/* Payment Method */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
            <button onClick={() => { setPayMethod("cash"); setReceived(""); }} style={{
              padding: "14px", borderRadius: 10, fontFamily: font, fontSize: 14, fontWeight: 600, cursor: "pointer",
              border: `2px solid ${payMethod === "cash" ? palette.green : palette.border}`,
              background: payMethod === "cash" ? palette.greenSoft : "transparent",
              color: payMethod === "cash" ? palette.green : palette.textDim,
            }}>現金</button>
            <button onClick={() => { setPayMethod("card"); setReceived(""); }} style={{
              padding: "14px", borderRadius: 10, fontFamily: font, fontSize: 14, fontWeight: 600, cursor: "pointer",
              border: `2px solid ${payMethod === "card" ? palette.accent : palette.border}`,
              background: payMethod === "card" ? palette.accentSoft : "transparent",
              color: payMethod === "card" ? palette.accent : palette.textDim,
            }}>クレジット</button>
          </div>

          {(() => {
            const tax = Math.floor(total * 0.1);
            const cardFee = payMethod === "card" ? Math.floor(total * 0.1) : 0;
            const grandTotal = total + tax + cardFee;
            const rcv = parseInt(received) || 0;
            const change = rcv - grandTotal;
            return (
              <>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: palette.textDim, marginBottom: 4 }}>お支払い金額</div>
                  <div style={{ fontSize: 36, fontWeight: 700, color: palette.white, fontVariantNumeric: "tabular-nums" }}>{formatYen(grandTotal)}</div>
                  <div style={{ fontSize: 13, color: palette.textDim, marginTop: 8, lineHeight: 1.8 }}>
                    小計 {formatYen(total)}<br/>
                    TAX(10%) {formatYen(tax)}
                    {payMethod === "card" && <><br/>カード手数料(10%) {formatYen(cardFee)}</>}
                  </div>
                  <div style={{ fontSize: 12, color: palette.textDim, marginTop: 4 }}>{customer.name} 様 ・ {payMethod === "cash" ? "現金" : "クレジット"}</div>
                </div>

                {payMethod === "cash" && (
                  <div style={{ background: palette.bg, borderRadius: 10, padding: 12, marginBottom: 16 }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: palette.textDim, marginBottom: 8 }}>預かり金額</div>
                    <input style={{ ...s.input, fontSize: 20, fontWeight: 700, textAlign: "right", marginBottom: 8 }}
                      type="number" placeholder="0" value={received}
                      onChange={e => setReceived(e.target.value)} />
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                      {[1000, 2000, 3000, 5000, 10000, 20000, 30000, 50000].map(amt => (
                        <button key={amt} onClick={() => setReceived(String(amt))} style={{
                          ...s.btnOutline, padding: "6px 10px", fontSize: 12, flex: "1 0 auto", minWidth: 60,
                          ...(parseInt(received) === amt ? { background: palette.accentSoft, color: palette.accent, borderColor: palette.accent } : {}),
                        }}>{formatYen(amt)}</button>
                      ))}
                      <button onClick={() => setReceived(String(grandTotal))} style={{
                        ...s.btnOutline, padding: "6px 10px", fontSize: 12, flex: "1 0 auto", minWidth: 60,
                        borderColor: palette.green, color: palette.green,
                      }}>ぴったり</button>
                    </div>
                    {rcv > 0 && (
                      <div style={{
                        textAlign: "center", padding: 12, borderRadius: 10,
                        background: change >= 0 ? palette.greenSoft : "rgba(248,113,113,0.12)",
                      }}>
                        <div style={{ fontSize: 12, color: change >= 0 ? palette.green : palette.red, marginBottom: 4 }}>
                          {change >= 0 ? "お釣り" : "不足"}
                        </div>
                        <div style={{ fontSize: 28, fontWeight: 700, color: change >= 0 ? palette.green : palette.red, fontVariantNumeric: "tabular-nums" }}>
                          {formatYen(Math.abs(change))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button style={{ ...s.btnOutline, padding: "12px", fontSize: 14 }} onClick={() => { setShowCheckout(false); setReceived(""); }}>戻る</button>
                  <button style={{ ...s.btn, padding: "12px", fontSize: 14, background: palette.green, opacity: payMethod === "cash" && rcv > 0 && change < 0 ? 0.4 : 1 }}
                    onClick={() => { if (payMethod === "card" || change >= 0) { onCheckout(cart, role, datetime, payMethod); setReceived(""); } }}>支払い</button>
                </div>
              </>
            );
          })()}
        </div>
      )}
    </div>
  );
}

// ─── Customer Tabs (Entry) ───
function EntryForm({ onAdd, fixedStaff, isManager, openTabs, onUpdateTabs, menu }) {
  const [selectedId, setSelectedId] = useState(null);
  const [newName, setNewName] = useState("");
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [, setTick] = useState(0);

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 30000);
    return () => clearInterval(id);
  }, []);

  const setOpenTabs = onUpdateTabs;

  const addCustomer = () => {
    if (!newName.trim()) return;
    const id = crypto.randomUUID();
    setOpenTabs([...openTabs, { id, name: newName.trim(), staff: fixedStaff, items: [], role: "従業員", datetime: nowLocal(), startTime: Date.now() }]);
    setNewName("");
    setSelectedId(id);
  };

  const myTabs = openTabs.filter(t => t.staff === fixedStaff);

  const deleteCustomer = (id) => {
    setOpenTabs(openTabs.filter(t => t.id !== id));
    setConfirmDeleteId(null);
  };

  const saveItems = (id, items, role, datetime) => {
    setOpenTabs(openTabs.map(t => t.id === id ? { ...t, items, role, datetime } : t));
  };

  const checkout = (id, items, role, datetime, payMethod) => {
    const tab = openTabs.find(t => t.id === id);
    const total = items.reduce((s, c) => s + calcItemTotal(c), 0);
    const tax = Math.floor(total * 0.1);
    const cardFee = payMethod === "card" ? Math.floor(total * 0.1) : 0;
    const grandTotal = total + tax + cardFee;
    onAdd({
      id: crypto.randomUUID(),
      staff: fixedStaff,
      customerName: tab.name,
      amount: grandTotal,
      subtotal: total,
      tax,
      cardFee,
      payMethod: payMethod || "cash",
      role: isManager ? "-" : role,
      datetime: isManager ? nowLocal() : datetime,
      items,
    });
    setOpenTabs(openTabs.filter(t => t.id !== id));
    setSelectedId(null);
  };

  const selected = openTabs.find(t => t.id === selectedId);

  if (selected) {
    return (
      <OrderPanel
        customer={selected}
        isManager={isManager}
        menu={menu}
        onSave={(items, role, datetime) => saveItems(selected.id, items, role, datetime)}
        onCheckout={(items, role, datetime, payMethod) => checkout(selected.id, items, role, datetime, payMethod)}
        onBack={() => setSelectedId(null)}
      />
    );
  }

  return (
    <div>
      {/* New Customer */}
      <div style={{ ...s.card, display: "flex", gap: 10 }}>
        <input style={{ ...s.input, flex: 1 }} type="text" placeholder="お客様名を入力" value={newName} onChange={e => setNewName(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") addCustomer(); }} />
        <button style={{ ...s.btn, whiteSpace: "nowrap" }} onClick={addCustomer}>追加</button>
      </div>

      {/* Open Tabs */}
      {myTabs.length === 0 ? (
        <div style={{ ...s.card, textAlign: "center", color: palette.textDim }}>お客様を追加してください</div>
      ) : (
        <div style={{ display: "grid", gap: 10 }}>
          {myTabs.map(tab => {
            const tabTotal = tab.items.reduce((s, c) => s + calcItemTotal(c), 0);
            const itemCount = tab.items.reduce((s, c) => s + c.qty, 0);
            const isConfirming = confirmDeleteId === tab.id;
            return (
              <div key={tab.id} style={{
                ...s.card, marginBottom: 0,
                border: `1px solid ${isConfirming ? palette.red : palette.border}`,
              }}>
                {isConfirming ? (
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: palette.white, marginBottom: 4 }}>
                      「{tab.name}」様を削除しますか？
                    </div>
                    <div style={{ fontSize: 12, color: palette.textDim, marginBottom: 16 }}>
                      注文内容（{itemCount}点 / {formatYen(tabTotal)}）もすべて削除されます
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <button style={{ ...s.btnOutline, padding: "10px" }} onClick={() => setConfirmDeleteId(null)}>キャンセル</button>
                      <button style={{ ...s.btn, padding: "10px", background: palette.red }} onClick={() => deleteCustomer(tab.id)}>削除する</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={() => setSelectedId(tab.id)}>
                    <div style={{ textAlign: "left" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 16, fontWeight: 700, color: palette.white }}>{tab.name} 様</span>
                        {(() => {
                          const plan = tab.items.find(c => PLAN_NAMES.includes(c.name));
                          return plan ? <span style={s.tag(palette.greenSoft, palette.green)}>{plan.name === "飲み飲ませ（無制限）" ? "飲み飲ませ" : plan.name}</span> : <span style={s.tag(palette.orangeSoft, palette.orange)}>未設定</span>;
                        })()}
                      </div>
                      <div style={{ fontSize: 12, color: palette.textDim, marginTop: 4 }}>
                        {formatTime(tab.startTime)} 開始 ・ {elapsedStr(tab.startTime)} 経過
                      </div>
                      <div style={{ fontSize: 12, color: palette.textDim, marginTop: 2 }}>
                        {itemCount > 0 ? `${itemCount}点` : "注文なし"}
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 18, fontWeight: 700, color: tabTotal > 0 ? palette.white : palette.textDim, fontVariantNumeric: "tabular-nums" }}>
                          {formatYen(tabTotal)}
                        </div>
                        <div style={s.tag(palette.orangeSoft, palette.orange)}>対応中</div>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(tab.id); }} style={{
                        background: "none", border: `1px solid ${palette.border}`, borderRadius: 8,
                        color: palette.red, cursor: "pointer", fontSize: 12, padding: "6px 10px", fontFamily: font,
                      }}>削除</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── Receipt Modal (Drive PDF) ───
function ReceiptModal({ detail, onClose }) {
  const [status, setStatus] = useState("idle"); // idle, loading, done, error
  const [driveUrl, setDriveUrl] = useState("");
  const [errorMsg, setErrorMsg] = useState("");
  const [receiptName, setReceiptName] = useState(detail.customerName || "");

  const generateReceipt = async () => {
    setStatus("loading");
    const receiptData = {
      date: detail.datetime?.replace("T", " "),
      customer: receiptName,
      staff: detail.staff,
      items: (detail.items || []).map(item => ({
        name: item.name, qty: item.qty, hours: item.hours,
        plan: PLAN_NAMES.includes(item.name),
        total: calcItemTotal(item),
      })),
      subtotal: detail.subtotal || 0,
      tax: detail.tax || 0,
      cardFee: detail.cardFee || 0,
      amount: detail.amount,
      payMethod: detail.payMethod || "cash",
    };
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "createReceipt", data: receiptData }),
      });
      const json = await res.json();
      if (json.success && json.url) {
        setDriveUrl(json.url);
        setStatus("done");
      } else {
        setErrorMsg(json.error || "生成に失敗しました");
        setStatus("error");
      }
    } catch (e) {
      setErrorMsg("通信エラー: " + e.message);
      setStatus("error");
    }
  };

  const qrUrl = driveUrl ? `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(driveUrl)}` : "";

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}
      onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 24, maxWidth: 380, width: "100%", color: "#1a1a1a", maxHeight: "90vh", overflowY: "auto" }}
        onClick={e => e.stopPropagation()}>

        {/* Receipt content - traditional style */}
        {(() => {
          const dateStr = detail.datetime || "";
          const dm = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
          const jpDate = dm ? `${dm[1]}年${parseInt(dm[2])}月${parseInt(dm[3])}日` : dateStr;
          const itemsList = (detail.items || []).map(item => item.name + (PLAN_NAMES.includes(item.name) ? ` ${item.qty}名` : ` ×${item.qty}`)).join("、");
          return (
            <div style={{ border: "2px solid #333", padding: "20px", marginBottom: 16 }}>
              <div style={{ textAlign: "center", fontSize: 22, fontWeight: 700, letterSpacing: 12, marginBottom: 16 }}>領 収 書</div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 16 }}>
                <div style={{ fontSize: 14, borderBottom: "1px solid #333", paddingBottom: 4, minWidth: 140, display: "flex", alignItems: "center" }}>
                  <input value={receiptName} onChange={e => setReceiptName(e.target.value)}
                    style={{ border: "none", borderBottom: "1px dashed #999", outline: "none", fontSize: 14, fontFamily: font, width: 140, padding: "2px 0", background: "transparent", color: "#1a1a1a" }}
                    placeholder="宛名を入力" />
                  <span>　様</span>
                </div>
                <div style={{ fontSize: 12 }}>{jpDate}</div>
              </div>
              <div style={{ border: "2px solid #333", padding: "12px 16px", textAlign: "center", marginBottom: 12, position: "relative" }}>
                <div style={{ position: "absolute", top: 3, left: 3, right: 3, bottom: 3, border: "1px solid #999" }} />
                <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: 3, position: "relative" }}>{formatYen(detail.amount)}−</div>
              </div>
              <div style={{ fontSize: 11, borderBottom: "1px solid #ccc", paddingBottom: 8, marginBottom: 12 }}>
                <span style={{ fontWeight: 700 }}>但し</span>　{itemsList || "飲食代"}　として上記の金額を正に領収いたしました。
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                <div>
                  <div style={{ border: "1px solid #333", display: "inline-block", padding: "1px 6px", fontSize: 10, marginBottom: 6 }}>内　訳</div>
                  <div style={{ padding: "2px 0" }}>税抜金額　{formatYen(Math.floor(detail.amount / 1.1))}</div>
                  <div style={{ padding: "2px 0" }}>消費税（10%）　{formatYen(detail.amount - Math.floor(detail.amount / 1.1))}</div>
                </div>
                <div style={{ textAlign: "right", lineHeight: 1.8 }}>
                  <div style={{ border: "1px solid #c33", display: "inline-block", padding: "2px 8px", color: "#c33", fontSize: 10, marginBottom: 4 }}>10%対象　{formatYen(Math.floor(detail.amount / 1.1))}</div><br/>
                  決済：{detail.payMethod === "card" ? "クレジット" : "現金"}<br/>
                  担当：{detail.staff}
                </div>
              </div>
            </div>
          );
        })()}

        {/* Actions */}
        {status === "idle" && (
          <button onClick={generateReceipt} style={{
            width: "100%", padding: "14px", borderRadius: 8, border: "none",
            background: "#1a73e8", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font,
          }}>Google DriveにPDF保存 & QR発行</button>
        )}

        {status === "loading" && (
          <div style={{ textAlign: "center", padding: 20, color: "#888" }}>
            <div style={{ fontSize: 14, marginBottom: 8 }}>PDF生成中...</div>
            <div style={{ fontSize: 24 }}>⏳</div>
          </div>
        )}

        {status === "error" && (
          <div>
            <div style={{ textAlign: "center", padding: 12, background: "#fee", borderRadius: 8, color: "#c00", fontSize: 13, marginBottom: 12 }}>
              {errorMsg}
            </div>
            <button onClick={generateReceipt} style={{
              width: "100%", padding: "12px", borderRadius: 8, border: "none",
              background: "#1a73e8", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font,
            }}>再試行</button>
          </div>
        )}

        {status === "done" && (
          <div>
            <div style={{ textAlign: "center", borderTop: "2px dashed #ccc", paddingTop: 16 }}>
              <div style={{ fontSize: 12, color: "#1e7e34", fontWeight: 600, marginBottom: 8 }}>✓ Google Driveに保存しました</div>
              <div style={{ fontSize: 11, color: "#888", marginBottom: 12 }}>QRコードを読み取るとPDFを確認できます</div>
              <img src={qrUrl} alt="Receipt QR" style={{ width: 200, height: 200 }} />
            </div>
          </div>
        )}

        <button onClick={onClose} style={{
          width: "100%", marginTop: 12, padding: "12px", borderRadius: 8, border: "none",
          background: "#1a1a1a", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font,
        }}>閉じる</button>
      </div>
    </div>
  );
}

// ─── Salary Summary ───
function SalarySummary({ entries, staffName, managerName }) {
  const filtered = staffName ? entries.filter(e => e.staff === staffName) : entries;

  const byStaff = {};
  for (const e of filtered) {
    const taxEx = Math.floor(e.amount / 1.1);
    if (!byStaff[e.staff]) byStaff[e.staff] = { total: 0, taxExcluded: 0, pay: 0, mgrShare: 0, companyShare: 0 };
    byStaff[e.staff].total += e.amount;
    byStaff[e.staff].taxExcluded += taxEx;
    byStaff[e.staff].pay += Math.floor(taxEx * (ROLES[e.role] || 0));
    byStaff[e.staff].mgrShare += Math.floor(taxEx * (MGR_RATES[e.role] || 0));
    byStaff[e.staff].companyShare += Math.floor(taxEx * (COMPANY_RATES[e.role] || 0));
  }

  const totalAllSales = filtered.reduce((s, e) => s + e.amount, 0);
  const totalTaxExcluded = Object.values(byStaff).reduce((s, v) => s + v.taxExcluded, 0);
  const totalMgrShare = Object.values(byStaff).reduce((s, v) => s + v.mgrShare, 0);
  const perMgrShare = Math.floor(totalMgrShare / MGR_SPLIT); // 各管理者10%ずつ

  // Manager's own sales
  const mgrOwnEntries = managerName ? filtered.filter(e => e.staff === managerName) : [];
  const mgrOwnTaxExcluded = mgrOwnEntries.reduce((s, e) => s + Math.floor(e.amount / 1.1), 0);

  return (
    <div>
      <div style={s.card}>
        <div style={s.cardTitle}>給与計算（当月）</div>
        {Object.keys(byStaff).length === 0 ? (
          <div style={{ color: palette.textDim }}>データなし</div>
        ) : (
          <table style={s.table}>
            <thead>
              <tr>
                <th style={s.th}>担当者</th>
                <th style={s.th}>売上合計</th>
                <th style={s.th}>税抜合計</th>
                <th style={s.th}>報酬50%</th>
                <th style={s.th}>管理者20%</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(byStaff).map(([name, d]) => (
                <tr key={name}>
                  <td style={{ ...s.td, fontWeight: 600 }}>{name}</td>
                  <td style={{ ...s.td, fontVariantNumeric: "tabular-nums" }}>{formatYen(d.total)}</td>
                  <td style={{ ...s.td, fontVariantNumeric: "tabular-nums", color: palette.textDim }}>{formatYen(d.taxExcluded)}</td>
                  <td style={{ ...s.td, color: palette.green, fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{formatYen(d.pay)}</td>
                  <td style={{ ...s.td, fontVariantNumeric: "tabular-nums" }}>{formatYen(d.mgrShare)}</td>
                </tr>
              ))}
              <tr style={{ borderTop: `2px solid ${palette.border}` }}>
                <td style={{ ...s.td, fontWeight: 700 }}>合計</td>
                <td style={{ ...s.td, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{formatYen(totalAllSales)}</td>
                <td style={{ ...s.td, fontWeight: 700, fontVariantNumeric: "tabular-nums", color: palette.textDim }}>{formatYen(totalTaxExcluded)}</td>
                <td style={{ ...s.td, fontWeight: 700, fontVariantNumeric: "tabular-nums", color: palette.green }}>{formatYen(Object.values(byStaff).reduce((s, v) => s + v.pay, 0))}</td>
                <td style={{ ...s.td, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{formatYen(totalMgrShare)}</td>
              </tr>
            </tbody>
          </table>
        )}
      </div>

      {managerName && (() => {
        const mgrTotal = mgrOwnTaxExcluded + perMgrShare;
        const bonus = calcManagerBonus(mgrTotal);
        const finalSalary = MANAGER_BASE + bonus;
        return (
          <div>
            <div style={s.card}>
              <div style={s.cardTitle}>管理者売上（{managerName}）※税抜計算</div>
              <div style={s.grid2}>
                <div>
                  <div style={s.statLabel}>自身の売上（税抜）</div>
                  <div style={{ ...s.statNum, fontSize: 22 }}>{formatYen(mgrOwnTaxExcluded)}</div>
                </div>
                <div>
                  <div style={s.statLabel}>管理者報酬（20%中の10%）</div>
                  <div style={{ ...s.statNum, fontSize: 22 }}>{formatYen(perMgrShare)}</div>
                </div>
                <div style={{ gridColumn: "1 / -1" }}>
                  <div style={s.statLabel}>管理者 合計（税抜）</div>
                  <div style={{ ...s.statNum, fontSize: 24, color: palette.accent }}>{formatYen(mgrTotal)}</div>
                  <div style={{ fontSize: 11, color: palette.textDim, marginTop: 4 }}>※管理者報酬20%のうち各管理者10%配分</div>
                </div>
              </div>
            </div>

            <div style={s.card}>
              <div style={s.cardTitle}>管理者報酬（第4条）</div>
              <div style={{ background: palette.cardAlt, borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 13 }}>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0" }}>
                  <span style={{ color: palette.textDim }}>現在の売上ティア</span>
                  <span style={{ fontWeight: 600, color: palette.accent }}>{getBonusTierLabel(mgrTotal)}</span>
                </div>
                <div style={{ borderTop: `1px solid ${palette.border}`, marginTop: 8, paddingTop: 8 }}>
                  {BONUS_TIERS.slice().reverse().map(t => (
                    <div key={t.min} style={{ display: "flex", justifyContent: "space-between", padding: "2px 0", color: mgrTotal >= t.min ? palette.white : palette.textDim }}>
                      <span>{formatYen(t.min)}以上</span>
                      <span style={{ fontWeight: mgrTotal >= t.min ? 700 : 400 }}>{Math.floor(t.rate * 100)}% {mgrTotal >= t.min ? "◀" : ""}</span>
                    </div>
                  ))}
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "2px 0", color: mgrTotal < 400000 ? palette.white : palette.textDim }}>
                    <span>40万円未満</span>
                    <span style={{ fontWeight: mgrTotal < 400000 ? 700 : 400 }}>0% {mgrTotal < 400000 ? "◀" : ""}</span>
                  </div>
                </div>
              </div>
              <div style={s.grid2}>
                <div>
                  <div style={s.statLabel}>固定報酬（税込）</div>
                  <div style={{ ...s.statNum, fontSize: 22 }}>{formatYen(MANAGER_BASE)}</div>
                </div>
                <div>
                  <div style={s.statLabel}>成果報酬</div>
                  <div style={{ ...s.statNum, fontSize: 22 }}>{formatYen(bonus)}</div>
                </div>
                <div style={{ gridColumn: "1 / -1", borderTop: `2px solid ${palette.border}`, paddingTop: 12 }}>
                  <div style={s.statLabel}>今月の給料</div>
                  <div style={{ ...s.statNum, fontSize: 28, color: palette.green }}>{formatYen(finalSalary)}</div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── Password Change ───
function PasswordChange({ staffName, staffList, onUpdateStaff }) {
  const [showPw, setShowPw] = useState(false);
  const [newPw, setNewPw] = useState("");
  const [msg, setMsg] = useState("");

  const changePw = () => {
    if (newPw.length !== 4) { setMsg("4桁で入力してください"); return; }
    onUpdateStaff(staffList.map(st => st.name === staffName ? { ...st, password: newPw } : st));
    setNewPw("");
    setMsg("変更しました");
    setTimeout(() => { setMsg(""); setShowPw(false); }, 1500);
  };

  if (!showPw) return (
    <button onClick={() => setShowPw(true)} style={{ ...s.btnOutline, padding: "5px 12px", fontSize: 11, marginBottom: 12 }}>パスワード変更</button>
  );

  return (
    <div style={{ ...s.card, padding: 16, marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: palette.white }}>新しいパスワード（4桁）</span>
        <button onClick={() => { setShowPw(false); setNewPw(""); setMsg(""); }} style={{ ...s.btnOutline, padding: "4px 10px", fontSize: 11 }}>×</button>
      </div>
      <NumPad value={newPw} onChange={v => { setNewPw(v); setMsg(""); }} maxLen={4} />
      <button onClick={changePw} style={{ ...s.btn, width: "100%", padding: "10px", fontSize: 13, marginTop: 12, opacity: newPw.length === 4 ? 1 : 0.4 }}>変更</button>
      {msg && <div style={{ color: msg === "変更しました" ? palette.green : palette.red, fontSize: 12, marginTop: 6, textAlign: "center" }}>{msg}</div>}
    </div>
  );
}

// ─── Advance Request (Staff) ───
function AdvanceRequest({ staffName, advances, onUpdateAdvances, entries, selectedMonth }) {
  const [amount, setAmount] = useState("");
  const [msg, setMsg] = useState("");
  const [msgColor, setMsgColor] = useState(palette.green);

  const myAdvances = advances.filter(a => a.staff === staffName);
  const monthAdvances = myAdvances.filter(a => a.requestDate && a.requestDate.startsWith(selectedMonth));
  const pending = monthAdvances.filter(a => a.status === "pending" || a.status === "processed");
  const received = monthAdvances.filter(a => a.status === "received");
  const totalReceived = received.reduce((s, a) => s + a.amount, 0);
  const totalPending = pending.reduce((s, a) => s + a.amount, 0);

  // Calculate max advance = current month pay - already received - pending
  const myPay = (entries || []).reduce((s, e) => s + Math.floor(Math.floor(e.amount / 1.1) * (ROLES[e.role] || 0)), 0);
  const available = Math.max(0, myPay - totalReceived - totalPending);

  const showMsg = (text, color) => {
    setMsg(text);
    setMsgColor(color || palette.green);
    setTimeout(() => setMsg(""), 2500);
  };

  const submit = () => {
    const amt = parseInt(amount);
    if (!amt || amt <= 0) { showMsg("金額を入力してください", palette.red); return; }
    if (amt > available) { showMsg(`申請可能額は${formatYen(available)}までです`, palette.red); return; }
    const newAdv = {
      id: crypto.randomUUID(),
      staff: staffName,
      amount: amt,
      status: "pending",
      requestDate: new Date().toISOString().slice(0, 19).replace("T", " "),
    };
    onUpdateAdvances([...advances, newAdv]);
    setAmount("");
    showMsg("申請しました", palette.green);
  };

  const cancelAdvance = (id) => {
    onUpdateAdvances(advances.filter(a => a.id !== id));
    showMsg("申請を取り消しました", palette.orange);
  };

  const confirmReceive = (id) => {
    onUpdateAdvances(advances.map(a => a.id === id ? { ...a, status: "received", receivedDate: new Date().toISOString().slice(0, 19).replace("T", " ") } : a));
  };

  return (
    <div style={{ ...s.card, marginTop: 12 }}>
      <div style={s.cardTitle}>前借り申請</div>

      {/* Summary */}
      <div style={{ display: "flex", gap: 16, marginBottom: 12, fontSize: 12 }}>
        <div>
          <span style={{ color: palette.textDim }}>報酬見込: </span>
          <span style={{ fontWeight: 600 }}>{formatYen(myPay)}</span>
        </div>
        <div>
          <span style={{ color: palette.textDim }}>受取済: </span>
          <span style={{ fontWeight: 600, color: totalReceived > 0 ? palette.orange : palette.textDim }}>{formatYen(totalReceived)}</span>
        </div>
        <div>
          <span style={{ color: palette.textDim }}>申請可能: </span>
          <span style={{ fontWeight: 600, color: palette.green }}>{formatYen(available)}</span>
        </div>
      </div>

      {/* Request form */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
        <input style={{ ...s.input, flex: 1, fontSize: 14 }} type="number" placeholder={`上限 ${formatYen(available)}`} value={amount} onChange={e => setAmount(e.target.value)} />
        <button onClick={() => setAmount(String(available))} style={{ ...s.btnOutline, padding: "8px 12px", fontSize: 12, whiteSpace: "nowrap", color: palette.green, borderColor: palette.green, opacity: available <= 0 ? 0.4 : 1 }}
          disabled={available <= 0}>満額</button>
        <button onClick={submit} style={{ ...s.btn, padding: "8px 16px", fontSize: 13, whiteSpace: "nowrap", opacity: available <= 0 ? 0.4 : 1 }}
          disabled={available <= 0}>申請</button>
      </div>
      {msg && <div style={{ color: msgColor, fontSize: 12, marginBottom: 8 }}>{msg}</div>}

      {/* Active requests */}
      {pending.length > 0 && (
        <div>
          <div style={{ fontSize: 12, color: palette.textDim, marginBottom: 8 }}>進行中の申請</div>
          {pending.map(a => (
            <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${palette.border}`, fontSize: 13 }}>
              <div>

}

  const pending = advances.filter(a => a.status === "pending");

// ─── Cashbox Manager (Master) ───
function CashboxManager({ entries, advances, cashbox, onUpdateCashbox }) {
  const [selectedMonth, setSelectedMonth] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
  });
  const [memo, setMemo] = useState("");
  const [amount, setAmount] = useState("");
  const [txType, setTxType] = useState("in");

  // Build unified ledger from all sources
  const monthEntries = entries.filter(e => e.datetime && e.datetime.startsWith(selectedMonth));
  const monthAdvances = advances.filter(a => a.status === "received" && a.receivedDate && a.receivedDate.startsWith(selectedMonth));
  const monthCashbox = cashbox.filter(c => c.date && c.date.startsWith(selectedMonth));

  // Cash sales
  const cashSales = monthEntries.filter(e => e.payMethod !== "card");
  const totalCashIn = cashSales.reduce((s, e) => s + e.amount, 0);

  // Card sales
  const cardSales = monthEntries.filter(e => e.payMethod === "card");
  const totalCardSales = cardSales.reduce((s, e) => s + e.amount, 0);

  // Advance payouts (cash out)
  const totalAdvanceOut = monthAdvances.reduce((s, a) => s + a.amount, 0);

  // Manual entries
  const manualIn = monthCashbox.filter(c => c.type === "in").reduce((s, c) => s + c.amount, 0);
  const manualOut = monthCashbox.filter(c => c.type === "out").reduce((s, c) => s + c.amount, 0);

  // Cash balance
  const cashBalance = totalCashIn - totalAdvanceOut + manualIn - manualOut;

  // Build chronological ledger
  const ledger = [
    ...cashSales.map(e => ({ date: e.datetime?.replace("T", " "), desc: `現金売上（${e.customerName || "-"}）担当:${e.staff}`, in: e.amount, out: 0, cat: "cash" })),
    ...cardSales.map(e => ({ date: e.datetime?.replace("T", " "), desc: `カード売上（${e.customerName || "-"}）担当:${e.staff}`, in: e.amount, out: 0, cat: "card" })),
    ...monthAdvances.map(a => ({ date: a.receivedDate, desc: `前借り支払（${a.staff}）`, in: 0, out: a.amount, cat: "cash" })),
    ...monthCashbox.map(c => ({ date: c.date, desc: c.memo || (c.type === "in" ? "入金" : "出金"), in: c.type === "in" ? c.amount : 0, out: c.type === "out" ? c.amount : 0, cat: "cash" })),
  ].sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  const months = [...new Set([
    ...entries.map(e => e.datetime?.slice(0, 7)),
    ...advances.filter(a => a.receivedDate).map(a => a.receivedDate.slice(0, 7)),
    ...cashbox.map(c => c.date?.slice(0, 7)),
  ].filter(Boolean))].sort().reverse();

  const addManual = () => {
    const amt = parseInt(amount);
    if (!amt || amt <= 0) return;
    onUpdateCashbox([...cashbox, {
      id: crypto.randomUUID(),
      type: txType,
      amount: amt,
      memo: memo.trim() || (txType === "in" ? "入金" : "出金"),
      date: new Date().toISOString().slice(0, 19).replace("T", " "),
    }]);
    setAmount("");
    setMemo("");
  };

  return (
    <div>
      {/* Month selector */}
      <div style={{ ...s.card, display: "flex", gap: 10, alignItems: "center" }}>
        <span style={{ fontSize: 13, color: palette.textDim }}>月：</span>
        <select style={{ ...s.select, width: 160 }} value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
          {months.length === 0 ? <option value={selectedMonth}>{selectedMonth.replace("-", "年") + "月"}</option> : months.map(m => (
            <option key={m} value={m}>{m.replace("-", "年") + "月"}</option>
          ))}
        </select>
      </div>

      {/* Summary cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        <div style={{ ...s.card, borderLeft: `3px solid ${palette.green}` }}>
          <div style={{ fontSize: 11, color: palette.textDim }}>金庫残高（現金）</div>
          <div style={{ fontSize: 24, fontWeight: 700, color: palette.green, fontVariantNumeric: "tabular-nums" }}>{formatYen(cashBalance)}</div>
          <div style={{ fontSize: 10, color: palette.textDim, marginTop: 4 }}>
            入金 {formatYen(totalCashIn + manualIn)} / 出金 {formatYen(totalAdvanceOut + manualOut)}
          </div>
        </div>
        <div style={{ ...s.card, borderLeft: `3px solid ${palette.accent}` }}>
          <div style={{ fontSize: 11, color: palette.textDim }}>カード売上（別管理）</div>
          <div style={{ fontSize: 24, fontWeight: 700, color: palette.accent, fontVariantNumeric: "tabular-nums" }}>{formatYen(totalCardSales)}</div>
          <div style={{ fontSize: 10, color: palette.textDim, marginTop: 4 }}>
            {cardSales.length}件
          </div>
        </div>
      </div>

      {/* Manual entry */}
      <div style={s.card}>
        <div style={s.cardTitle}>手動入出金</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
          <select style={{ ...s.select, width: 80 }} value={txType} onChange={e => setTxType(e.target.value)}>
            <option value="in">入金</option>
            <option value="out">出金</option>
          </select>
          <input style={{ ...s.input, flex: 1 }} type="number" placeholder="金額" value={amount} onChange={e => setAmount(e.target.value)} />
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input style={{ ...s.input, flex: 1 }} placeholder="メモ（任意）" value={memo} onChange={e => setMemo(e.target.value)} />
          <button onClick={addManual} style={{ ...s.btn, padding: "8px 16px", fontSize: 13, whiteSpace: "nowrap" }}>登録</button>
        </div>
      </div>

      {/* Ledger */}
      <div style={s.card}>
        <div style={s.cardTitle}>入出金履歴（{selectedMonth.replace("-", "年") + "月"}）</div>
        {ledger.length === 0 ? (
          <div style={{ color: palette.textDim, fontSize: 13 }}>データなし</div>
        ) : (
          <div style={{ overflowX: "auto" }}>
            <table style={s.table}>
              <thead>
                <tr>
                  <th style={s.th}>日時</th>
                  <th style={s.th}>内容</th>
                  <th style={s.th}>種別</th>
                  <th style={{ ...s.th, textAlign: "right" }}>入金</th>
                  <th style={{ ...s.th, textAlign: "right" }}>出金</th>
                </tr>
              </thead>
              <tbody>
                {ledger.map((l, i) => (
                  <tr key={i}>
                    <td style={{ ...s.td, fontSize: 11, whiteSpace: "nowrap" }}>{l.date || "-"}</td>
                    <td style={{ ...s.td, fontSize: 12 }}>{l.desc}</td>
                    <td style={s.td}>
                      <span style={s.tag(l.cat === "card" ? palette.accentSoft : palette.greenSoft, l.cat === "card" ? palette.accent : palette.green)}>
                        {l.cat === "card" ? "カード" : "現金"}
                      </span>
                    </td>
                    <td style={{ ...s.td, textAlign: "right", color: l.in > 0 ? palette.green : palette.textDim, fontWeight: l.in > 0 ? 600 : 400, fontVariantNumeric: "tabular-nums" }}>
                      {l.in > 0 ? formatYen(l.in) : "-"}
                    </td>
                    <td style={{ ...s.td, textAlign: "right", color: l.out > 0 ? palette.red : palette.textDim, fontWeight: l.out > 0 ? 600 : 400, fontVariantNumeric: "tabular-nums" }}>
                      {l.out > 0 ? formatYen(l.out) : "-"}
                    </td>
                  </tr>
                ))}
                <tr style={{ borderTop: `2px solid ${palette.border}` }}>
                  <td colSpan={3} style={{ ...s.td, fontWeight: 700 }}>合計</td>
                  <td style={{ ...s.td, textAlign: "right", fontWeight: 700, color: palette.green, fontVariantNumeric: "tabular-nums" }}>
                    {formatYen(ledger.reduce((s, l) => s + l.in, 0))}
                  </td>
                  <td style={{ ...s.td, textAlign: "right", fontWeight: 700, color: palette.red, fontVariantNumeric: "tabular-nums" }}>
                    {formatYen(ledger.reduce((s, l) => s + l.out, 0))}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

    setNewStaffPassword("0000");

  const changeRole = (name, newRole) => onUpdateStaff(staffList.map(s => s.name === name ? { ...s, role: newRole } : s));

const API_URL = "https://script.google.com/macros/s/AKfycbw_JJj_n_EwrdScVkOoVgvIp7JYTLNrazvEvwwwDQthCDVCbFa9Vl-Fyl9SF7qPk5gS/exec";

const STORAGE_KEY = "sales-manager-entries";
const TABS_STORAGE_KEY = "sales-manager-open-tabs";
const STAFF_STORAGE_KEY = "sales-manager-staff";
const MENU_STORAGE_KEY = "sales-manager-menu";
const ADVANCE_STORAGE_KEY = "sales-manager-advances";
const CASHBOX_STORAGE_KEY = "sales-manager-cashbox";
const SHIFT_STORAGE_KEY = "sales-manager-shifts";

async function saveData(key, data) {
  const json = JSON.stringify(data);
  // Save to Google Sheets
  if (API_URL && !API_URL.startsWith("ここ")) {
    try {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "set", key, value: json }),
      });
    } catch (e) { console.error("API save failed:", e); }
  }
  // Also save to localStorage as fallback
  try { localStorage.setItem(key, json); } catch (e) {}
}

async function loadData(key) {
  // Try Google Sheets first
  if (API_URL && !API_URL.startsWith("ここ")) {
    try {
      const res = await fetch(`${API_URL}?action=get&key=${encodeURIComponent(key)}`);
      const json = await res.json();
      if (json.success && json.value) {
        const parsed = JSON.parse(json.value);
        try { localStorage.setItem(key, JSON.stringify(parsed)); } catch (e) {}
        return parsed;
      }
    } catch (e) { console.error("API load failed, using localStorage:", e); }
  }
  // Fallback to localStorage
  try {
    const val = localStorage.getItem(key);
    if (val) return JSON.parse(val);
  } catch (e) {}
  // Fallback to window.storage (Claude artifact)
  try {
    const result = await window.storage.get(key);
    if (result && result.value) return JSON.parse(result.value);
  } catch (e) {}
  return null;
}

function parseReceiptParam() {
  try {
    const params = new URLSearchParams(window.location.search);
    const r = params.get("receipt");
    if (!r) return null;
    return JSON.parse(decodeURIComponent(escape(atob(r))));
  } catch (e) { return null; }
}

function App() {
  const receiptData = useMemo(() => parseReceiptParam(), []);
  if (receiptData) return <ReceiptViewer data={receiptData} />;
  const [user, setUser] = useState(null);
  const [entries, setEntries] = useState([]);
  const [openTabs, setOpenTabs] = useState([]);
  const [staffList, setStaffList] = useState(DEFAULT_STAFF);
  const [menu, setMenu] = useState(DEFAULT_MENU);
  const [advances, setAdvances] = useState([]);
  const [cashbox, setCashbox] = useState([]);
  const [shifts, setShifts] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");

  useEffect(() => {
    Promise.all([
      loadData(STORAGE_KEY),
      loadData(TABS_STORAGE_KEY),
      loadData(STAFF_STORAGE_KEY),
      loadData(MENU_STORAGE_KEY),
      loadData(ADVANCE_STORAGE_KEY),
      loadData(CASHBOX_STORAGE_KEY),
      loadData(SHIFT_STORAGE_KEY),
    ]).then(([e, t, st, m, adv, cb, sh]) => {
      if (e) setEntries(e);
      if (t) setOpenTabs(t);
      if (st) setStaffList(st);
      if (m) setMenu(m);
      if (adv) setAdvances(adv);
      if (cb) setCashbox(cb);
      if (sh) setShifts(sh);
      setLoaded(true);
    });
  }, []);

  const showSaved = () => {
    setSaveStatus("保存しました");
    setTimeout(() => setSaveStatus(""), 2000);
  };

  const addEntry = async (e) => {
    const next = [...entries, e];
    setEntries(next);
    await saveData(STORAGE_KEY, next);
    showSaved();
  };
  const deleteEntry = async (id) => {
    const next = entries.filter(e => e.id !== id);
    setEntries(next);
    await saveData(STORAGE_KEY, next);
    showSaved();
  };
  const updateTabs = async (tabs) => {
    setOpenTabs(tabs);
    await saveData(TABS_STORAGE_KEY, tabs);
  };
  const updateStaff = async (list) => {
    setStaffList(list);
    await saveData(STAFF_STORAGE_KEY, list);
    showSaved();
  };
  const updateMenu = async (m) => {
    setMenu(m);
    await saveData(MENU_STORAGE_KEY, m);
    showSaved();
  };
  const updateAdvances = async (list) => {
    setAdvances(list);
    await saveData(ADVANCE_STORAGE_KEY, list);
    showSaved();
  };
  const updateCashbox = async (list) => {
    setCashbox(list);
    await saveData(CASHBOX_STORAGE_KEY, list);
    showSaved();
  };
  const updateShifts = async (list) => {
    setShifts(list);
    await saveData(SHIFT_STORAGE_KEY, list);
    showSaved();
  };

  if (!loaded) return (
    <div style={{ ...s.loginWrap }}>
      <div style={{ color: palette.textDim, fontSize: 14 }}>読み込み中...</div>
    </div>
  );

  if (!user) return <Login onLogin={(role, name) => setUser({ role, name })} staffList={staffList} />;

  return (
    <div style={s.app}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
      <div style={s.header}>
        <div style={s.logo}>売上管理</div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {saveStatus && (
            <span style={{ fontSize: 11, color: palette.green, transition: "opacity .3s" }}>✓ {saveStatus}</span>
          )}
          <span style={s.badge(user.role === "master" ? "orange" : user.role === "owner" ? "orange" : user.role === "manager" ? "blue" : "green")}>
            {user.role === "master" ? "マスター" : user.role === "owner" ? `オーナー (${user.name})` : user.role === "manager" ? `管理者 (${user.name})` : user.name}
          </span>
          <button style={{ ...s.btnOutline, padding: "6px 12px", fontSize: 12 }} onClick={() => setUser(null)}>ログアウト</button>
        </div>
      </div>
      {user.role === "master"
        ? <MasterView staffList={staffList} onUpdateStaff={updateStaff} menu={menu} onUpdateMenu={updateMenu} entries={entries} onDeleteEntry={deleteEntry} advances={advances} onUpdateAdvances={updateAdvances} cashbox={cashbox} onUpdateCashbox={updateCashbox} shifts={shifts} onUpdateShifts={updateShifts} />
        : user.role === "owner"
          ? <OwnerView entries={entries} staffName={user.name} onAdd={addEntry} openTabs={openTabs} onUpdateTabs={updateTabs} menu={menu} staffList={staffList} onUpdateStaff={updateStaff} shifts={shifts} onUpdateShifts={updateShifts} />
          : user.role === "manager"
            ? <ManagerView entries={entries} onAdd={addEntry} onDelete={deleteEntry} staffName={user.name} openTabs={openTabs} onUpdateTabs={updateTabs} menu={menu} staffList={staffList} onUpdateStaff={updateStaff} advances={advances} onUpdateAdvances={updateAdvances} shifts={shifts} onUpdateShifts={updateShifts} />
            : <StaffView entries={entries} staffName={user.name} onAdd={addEntry} openTabs={openTabs} onUpdateTabs={updateTabs} menu={menu} staffList={staffList} onUpdateStaff={updateStaff} advances={advances} onUpdateAdvances={updateAdvances} shifts={shifts} onUpdateShifts={updateShifts} />
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
